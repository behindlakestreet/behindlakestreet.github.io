name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Use a unique concurrency group so we don't fight any other deploy.
concurrency:
  group: overlast-deploy
  cancel-in-progress: false

# Only need contents: write to push the built site to the gh-pages-equivalent
# branch that the action manages internally. No `pages: write` or
# `id-token: write` needed with this approach.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        # For a USER site (https://<user>.github.io/), leave as-is.
        # For a PROJECT site (https://<user>.github.io/<repo>/), set
        # VITE_BASE_PATH=/<repo>/ and update vite.config.ts.
        env:
          # Uncomment for project-site deploys:
          # VITE_BASE_PATH: /overlast-logger/
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # The directory Vite builds to. The action zips it and pushes
          # it to GitHub Pages; the auto `pages-build-deployment`
          # workflow picks it up and publishes.
          folder: dist
          # Use a separate branch for the deploy so the source code
          # on `main` stays clean.
          branch: gh-pages
          # Don't keep the action's commit history noisy; squash.
          single-commit: true
          # Keep the .git dir out of the deployed artifact.
          git-config-email: actions@github.com
          clean: true


