name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Use a unique concurrency group so we don't fight any other deploy.
concurrency:
  group: overlast-deploy
  cancel-in-progress: true

# Need write access to deploy + contents to checkout the repo.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        # For a USER site (https://<user>.github.io/), leave as-is.
        # For a PROJECT site (https://<user>.github.io/<repo>/), set
        # VITE_BASE_PATH=/<repo>/ and update vite.config.ts.
        env:
          # Uncomment for project-site deploys:
          # VITE_BASE_PATH: /overlast-logger/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


